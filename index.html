<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#080c14">
<title>منصة مراجعة الاختبار | مادة مخصصة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     DESIGN TOKENS & RESET
  ============================================================ */
  :root {
    --c-bg: #080c14; --c-surface: #0d1220; --c-card: #111827; --c-card2: #161f30;
    --c-border: rgba(56,189,248,0.12); --c-border2: rgba(56,189,248,0.22);
    --c-blue: #38bdf8; --c-blue2: #0ea5e9; --c-amber: #fbbf24;
    --c-green: #34d399; --c-red: #f87171; --c-purple: #a78bfa;
    --c-text: #f0f6ff; --c-muted: #8ba3c0; --c-dim: #4a6080;
    --font: 'Tajawal', sans-serif;
    --radius-sm: 8px; --radius-md: 14px; --radius-lg: 20px; --radius-xl: 28px;
    --shadow-blue: 0 0 0 1px rgba(56,189,248,0.15), 0 4px 24px rgba(14,165,233,0.12);
    --glow-blue: 0 0 20px rgba(56,189,248,0.25);
    --fs-scale: 1;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: calc(15px * var(--fs-scale, 1)); }
  body { font-family: var(--font); background: var(--c-bg); color: var(--c-text); min-height: 100vh; overflow-x: hidden; }

  /* ============================================================
     BACKGROUND EFFECTS
  ============================================================ */
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(56,189,248,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(56,189,248,0.03) 1px, transparent 1px); background-size: 48px 48px; pointer-events: none; z-index: 0; }
  body::after { content: ''; position: fixed; top: -200px; left: -200px; width: 600px; height: 600px; background: radial-gradient(circle, rgba(56,189,248,0.06) 0%, transparent 70%); pointer-events: none; z-index: 0; }
  .glow-spot-2 { position: fixed; bottom: -150px; right: -150px; width: 500px; height: 500px; background: radial-gradient(circle, rgba(167,139,250,0.07) 0%, transparent 70%); pointer-events: none; z-index: 0; }
  .bg-circles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; overflow: hidden; opacity: 0.5; }
  .bg-circles div { position: absolute; border-radius: 50%; filter: blur(60px); transition: background 0.5s ease; }
  .circle-1 { width: 400px; height: 400px; top: -100px; right: -100px; background: rgba(59, 130, 246, 0.15); }
  .circle-2 { width: 300px; height: 300px; bottom: -50px; left: -50px; background: rgba(245, 158, 11, 0.1); }

  /* ============================================================
     LAYOUT & UI COMPONENTS
  ============================================================ */
  .main-container { position: relative; z-index: 1; width: 94%; max-width: 940px; margin: 0 auto; padding: 24px 0 60px; }
  .topbar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 14px; padding: 14px 20px; background: var(--c-surface); border: 1px solid var(--c-border); border-radius: var(--radius-xl); margin-bottom: 28px; box-shadow: var(--shadow-blue); }
  .player-card { display: flex; align-items: center; gap: 14px; }
  .level-orb { position: relative; width: 50px; height: 50px; border-radius: 50%; background: conic-gradient(var(--c-amber) 0% 65%, var(--c-card) 65%); display: flex; align-items: center; justify-content: center; }
  .level-orb::before { content: ''; position: absolute; inset: 3px; border-radius: 50%; background: var(--c-surface); }
  .level-orb span { position: relative; z-index: 1; font-size: 1.25rem; font-weight: 900; color: var(--c-amber); }
  .player-info { display: flex; flex-direction: column; gap: 2px; }
  .player-label { font-size: 0.72rem; color: var(--c-dim); font-weight: 700; }
  .player-xp { font-size: 1.1rem; font-weight: 900; color: var(--c-amber); }
  .streak-pill { display: flex; align-items: center; gap: 6px; padding: 6px 14px; background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.18); border-radius: 999px; font-size: 0.88rem; font-weight: 700; color: #fca5a5; }
  .topbar-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: var(--radius-md); font-family: var(--font); font-size: 0.88rem; font-weight: 700; cursor: pointer; border: 1px solid transparent; transition: all 0.25s; text-decoration: none; }
  .btn-ghost { background: var(--c-card); border-color: var(--c-border); color: var(--c-muted); }
  .btn-ghost:hover { background: var(--c-card2); color: var(--c-text); }
  .btn-blue { background: rgba(56,189,248,0.1); border-color: rgba(56,189,248,0.25); color: var(--c-blue); }
  .btn-amber { background: rgba(251,191,36,0.1); border-color: rgba(251,191,36,0.22); color: var(--c-amber); }
  .btn-primary { background: linear-gradient(135deg, var(--c-blue2), #0369a1); color: #fff; box-shadow: 0 4px 16px rgba(14,165,233,0.3); }
  .btn-lg { padding: 14px 36px; font-size: 1.1rem; border-radius: var(--radius-lg); }

  /* ============================================================
     WELCOME SCREEN
  ============================================================ */
  .welcome-header { text-align: center; padding: 40px 0; }
  .platform-tag { display: inline-block; font-size: 0.75rem; font-weight: 700; color: var(--c-blue); background: rgba(56,189,248,0.08); padding: 5px 16px; border-radius: 999px; margin-bottom: 20px; }
  .platform-title { font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 900; margin-bottom: 12px; color: var(--c-text); }
  .platform-sub { color: var(--c-muted); font-size: 1.05rem; margin-bottom: 40px; }

  /* ============================================================
     QUIZ SCREEN
  ============================================================ */
  .quiz-topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .inv-bar { display: flex; gap: 6px; background: var(--c-card); padding: 6px 12px; border-radius: var(--radius-md); }
  .inv-btn { position: relative; background: transparent; border: none; font-size: 1.1rem; cursor: pointer; color: var(--c-text); }
  .inv-count { position: absolute; top: -4px; right: -4px; background: var(--c-amber); color: #000; font-size: 0.65rem; font-weight: 900; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .progress-track { width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 999px; overflow: hidden; margin-bottom: 28px; }
  .progress-fill-ui { height: 100%; background: linear-gradient(90deg, var(--c-blue2), var(--c-blue)); transition: width 0.4s; }
  .question-box-ui { font-size: 1.3rem; font-weight: 700; margin-bottom: 24px; padding: 20px; background: var(--c-card); border-right: 3px solid var(--c-blue); border-radius: var(--radius-lg); }
  .options-list { display: flex; flex-direction: column; gap: 10px; }
  .option-btn { display: flex; align-items: center; gap: 14px; padding: 14px 18px; background: var(--c-card); border: 1px solid var(--c-border); border-radius: var(--radius-md); cursor: pointer; font-weight: 500; color: var(--c-muted); }
  .option-btn:hover { background: var(--c-card2); color: var(--c-text); }
  .option-btn.correct { background: rgba(52,211,153,0.08); border-color: rgba(52,211,153,0.35); color: var(--c-green); }
  .option-btn.wrong { background: rgba(248,113,113,0.08); border-color: rgba(248,113,113,0.3); color: var(--c-red); }
  .option-btn.disabled { pointer-events: none; }
  .option-btn.hidden-hint { opacity: 0.1; pointer-events: none; }
  .explanation-ui { margin-top: 16px; padding: 16px; border-radius: var(--radius-md); border-right: 3px solid; display: none; }
  .explanation-ui.correct { background: rgba(52,211,153,0.05); border-color: var(--c-green); color: #a7f3d0; }
  .explanation-ui.wrong { background: rgba(248,113,113,0.05); border-color: var(--c-red); color: #fecaca; }

  /* ============================================================
     MODALS & ANIMATIONS
  ============================================================ */
  .modal-overlay-ui { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
  .modal-box { background: var(--c-surface); border: 1px solid var(--c-border2); border-radius: var(--radius-xl); padding: 32px; width: 100%; max-width: 520px; position: relative; }
  .modal-close { position: absolute; top: 16px; right: 20px; background: var(--c-card); border: 1px solid var(--c-border); color: var(--c-muted); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; }
  .fade-in-ui { animation: fade-up 0.35s ease both; }
  @keyframes fade-up { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .xp-popup { position: absolute; color: var(--c-amber); font-weight: 900; font-size: 1.5rem; pointer-events: none; animation: floatUp 1s ease forwards; z-index: 1000; }
  @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-50px); } }
</style>
</head>
<body>

<div class="bg-circles"><div class="circle-1" id="bg-circle-1"></div><div class="circle-2" id="bg-circle-2"></div></div>
<canvas id="canvas" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; opacity:0.1; pointer-events:none;"></canvas>

<div class="modal-overlay-ui" id="shop-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('shop-modal')">✕</button>
    <h2 style="color:var(--c-amber); margin-bottom: 20px;">🛒 متجر الأدوات</h2>
    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
      <span>أداة 50/50 (100 XP)</span>
      <button class="btn btn-amber" onclick="buyItem('fifty',100)">شراء</button>
    </div>
    <div style="display:flex; justify-content:space-between;">
      <span>الدرع الواقي (300 XP)</span>
      <button class="btn btn-blue" onclick="buyItem('shield',300)">شراء</button>
    </div>
  </div>
</div>

<div class="main-container">

  <div class="topbar fade-in-ui">
    <div class="player-card">
      <div class="level-orb"><span id="player-level">1</span></div>
      <div class="player-info">
        <span class="player-label">المستوى</span>
        <span class="player-xp"><span id="player-xp">0</span> XP</span>
      </div>
    </div>
    <div class="streak-pill" id="streak-box">🔥 ستريك: <span id="streak-count">0</span></div>
    <div class="topbar-btns">
      <button class="btn btn-amber" onclick="document.getElementById('shop-modal').style.display='flex'">🛒 متجر</button>
    </div>
  </div>

  <div id="welcome-screen" class="fade-in-ui">
    <div class="welcome-header">
      <div class="platform-tag">مراجعة شاملة</div>
      <h1 class="platform-title" id="main-title">المادة أساسيات البرمجة</h1>
      <p class="platform-sub">استعد لاختبارك وتدرب على الـ 100 سؤالاً</p>
      <button class="btn btn-primary btn-lg" onclick="startQuiz()">ابدأ الاختبار 🚀</button>
    </div>
  </div>

  <div id="quiz-screen" style="display:none;">
    <div class="quiz-topbar">
      <button class="btn btn-ghost" onclick="location.reload()">🏠 خروج</button>
      <div class="inv-bar">
        <button class="inv-btn" onclick="useFiftyFifty()">⚖️<span class="inv-count" id="count-fifty">0</span></button>
        <button class="inv-btn" onclick="useShield()">🛡️<span class="inv-count" id="count-shield">0</span></button>
      </div>
    </div>
    <div style="margin-bottom: 10px; font-weight:bold; color:var(--c-blue);" id="question-tracker">1 / 100</div>
    <div class="progress-track"><div class="progress-fill-ui" id="progress" style="width:0%"></div></div>

    <div class="question-box-ui fade-in-ui" id="question-text">جاري التحميل...</div>
    <div class="options-list" id="options-container"></div>
    <div class="explanation-ui" id="explanation-box"></div>

    <div style="margin-top: 24px; text-align: left;">
      <button class="btn btn-primary" id="next-btn" onclick="nextQuestion()" style="display:none;">التالي ➔</button>
    </div>
  </div>

  <div id="result-screen" style="display:none;" class="fade-in-ui text-center">
    <div style="text-align: center; padding: 40px 0;">
      <div style="font-size: 4rem;">🎓</div>
      <h2 style="font-size: 2rem; margin: 10px 0;">اكتمل الاختبار!</h2>
      <div style="font-size: 3rem; color: var(--c-green); font-weight: bold;" id="final-score">0%</div>
      <p style="color: var(--c-amber); font-size: 1.2rem; margin-top: 10px;">✨ مكتسب: <span id="earned-xp">0</span> XP</p>
      <button onclick="goToMainMenu()" class="main-btn">العودة للقائمة الرئيسية 🏠</button>
    </div>
  </div>

</div>

<script>
  // ==========================================
  // بيانات الأسئلة (الـ 50 سؤال ستوضع هنا)
  // ==========================================
const mySubjectData = {
    title: "أساسيات البرمجة",
    questions: [
      {
        q: "ما هي البرمجة؟",
        options: ["صيانة الحاسوب", "كتابة تعليمات وأوامر للحاسوب بلغة يفهمها", "تصميم واجهات", "تجميع البيانات"],
        correct: 1,
        explanation: "البرمجة هي عملية كتابة تعليمات وأوامر للحاسوب بلغة يفهمها، لتنفيذ مهام محددة أو حل مشكلات[cite: 41]."
      },
      {
        q: "لغة الآلة (Machine Language) عبارة عن:",
        options: ["لغة عالية المستوى", "رموز بسيطة", "أصفار وواحدات يفهمها المعالج مباشرة", "لغة رسومية"],
        correct: 2,
        explanation: "لغة الآلة هي لغة منخفضة المستوى، عبارة عن أصفار وواحدات يفهمها المعالج مباشرة[cite: 112]."
      },
      {
        q: "تُصنف لغة بايثون (Python) على أنها من:",
        options: ["لغات الآلة", "اللغات منخفضة المستوى", "لغات التجميع", "اللغات عالية المستوى"],
        correct: 3,
        explanation: "بايثون تعتبر من اللغات عالية المستوى، وهي سهلة القراءة والكتابة للبشر[cite: 126, 127]."
      },
      {
        q: "من مميزات بايثون التي تجعلها مثالية للمبتدئين:",
        options: ["صعوبة قراءتها", "صيغتها قريبة من اللغة الإنجليزية العادية", "تتطلب كتابة أكواد طويلة جداً", "لا تدعم المكتبات"],
        correct: 1,
        explanation: "صيغة Python قريبة جداً من اللغة الإنجليزية العادية، مما يجعلها أسهل للتعلم للمبتدئين[cite: 187]."
      },
      {
        q: "ما هي بيئة التطوير المتكاملة (IDE)؟",
        options: ["نظام تشغيل", "برنامج يوفر أدوات شاملة لكتابة وتحرير واختبار الكود", "متصفح إنترنت", "لغة برمجة جديدة"],
        correct: 1,
        explanation: "بيئة التطوير المتكاملة (IDE) هي برنامج يوفر للمبرمجين أدوات شاملة لكتابة وتحرير واختبار وتشغيل الأكواد[cite: 204]."
      },
      {
        q: "ما هو المتغير (Variable) في البرمجة؟",
        options: ["قيمة ثابتة لا تتغير", "اسم رمزي يشير إلى موقع في ذاكرة الحاسوب", "أداة لتشغيل الحاسوب", "دالة رياضية"],
        correct: 1,
        explanation: "المتغير هو اسم رمزي يشير إلى موقع في ذاكرة الحاسوب لتخزين البيانات[cite: 231]."
      },
      {
        q: "ماذا تعني ميزة 'الكتابة الديناميكية' (Dynamic Typing) في بايثون؟",
        options: ["تحديد نوع المتغير مسبقاً بشكل إجباري", "عدم إمكانية تغيير قيمة المتغير", "تحديد نوع المتغير تلقائياً بناءً على القيمة المخصصة له", "كتابة الكود بسرعة"],
        correct: 2,
        explanation: "الكتابة الديناميكية تعني تحديد نوع المتغير تلقائياً بناءً على القيمة المخصصة له دون الحاجة لتحديده مسبقاً[cite: 229]."
      },
      {
        q: "أي من أسماء المتغيرات التالية يُعتبر خاطئاً في بايثون؟",
        options: ["student_name", "_private", "2name", "my_variable"],
        correct: 2,
        explanation: "من القواعد الإلزامية أن لا يبدأ اسم المتغير برقم، ولذلك 2name يعتبر خاطئاً[cite: 242]."
      },
      {
        q: "في بايثون، أسماء المتغيرات حساسة لحالة الأحرف (Case Sensitive). هذا يعني أن:",
        options: ["age و Age هما نفس المتغير", "age و Age هما متغيران مختلفان تماماً", "لا يمكن استخدام الحروف الكبيرة", "يجب استخدام الحروف الصغيرة فقط"],
        correct: 1,
        explanation: "أسماء المتغيرات حساسة لحالة الأحرف، لذا age و Age و AGE هي متغيرات مختلفة تماماً[cite: 246]."
      },
      {
        q: "نوع البيانات int يُستخدم لتخزين:",
        options: ["النصوص", "الأعداد العشرية", "الأعداد الصحيحة", "القيم المنطقية"],
        correct: 2,
        explanation: "النوع int مخصص لتخزين الأعداد الصحيحة الموجبة والسالبة[cite: 259]."
      },
      {
        q: "المتغير gpa = 3.85 يعتبر من نوع البيانات:",
        options: ["int", "float", "str", "bool"],
        correct: 1,
        explanation: "الأعداد التي تحتوي على كسور عشرية تُصنف تحت نوع البيانات float[cite: 259]."
      },
      {
        q: "النصوص (Strings) في بايثون يجب أن توضع بين:",
        options: ["علامات اقتباس (' ' أو \" \")", "أقواس مربعة [ ]", "أقواس معكوفة { }", "بدون أي علامات"],
        correct: 0,
        explanation: "النصوص عبارة عن تسلسل من الأحرف ويجب أن تكون محاطة بعلامات اقتباس مفردة أو مزدوجة[cite: 260]."
      },
      {
        q: "ما هي نتيجة العملية: 'Hello' * 3 ؟",
        options: ["خطأ برمجي", "Hello3", "HelloHelloHello", "Hello+3"],
        correct: 2,
        explanation: "استخدام معامل الضرب مع النصوص يؤدي إلى تكرار النص، فالنتيجة هي HelloHelloHello[cite: 262]."
      },
      {
        q: "لتحويل النص '123' إلى عدد صحيح (Integer)، نستخدم الدالة:",
        options: ["str()", "float()", "bool()", "int()"],
        correct: 3,
        explanation: "نستخدم الدالة ()int لتحويل القيمة إلى رقم صحيح[cite: 270, 271]."
      },
      {
        q: "الدالة input() تُرجع البيانات المدخلة من المستخدم دائماً على شكل:",
        options: ["رقم صحيح (int)", "رقم عشري (float)", "نص (str)", "قيمة منطقية (bool)"],
        correct: 2,
        explanation: "الدالة ()input تُرجع البيانات دائماً كنص (string) حتى لو أدخل المستخدم أرقاماً[cite: 289]."
      },
      {
        q: "الرمز (//) في بايثون يُستخدم لـ:",
        options: ["القسمة العادية", "باقي القسمة", "القسمة الصحيحة (حذف الكسر العشري)", "الضرب"],
        correct: 2,
        explanation: "الرمز // يُستخدم للقسمة الصحيحة (Floor Division)، وتقوم بحذف أي كسر عشري لتعطيك أقرب رقم صحيح لأسفل[cite: 307]."
      },
      {
        q: "ما هو ناتج العملية 10 % 3 (باقي القسمة)؟",
        options: ["3", "1", "3.33", "0"],
        correct: 1,
        explanation: "باقي قسمة 10 على 3 هو 1، حيث 3*3=9 والمتبقي 1[cite: 310]."
      },
      {
        q: "لرفع الرقم 2 إلى الأس 3 (2 تكعيب) في بايثون نكتب:",
        options: ["2 ^ 3", "2 ** 3", "2 // 3", "2 * 3"],
        correct: 1,
        explanation: "الرفع إلى أس في بايثون يُكتب باستخدام المعامل **[cite: 313]."
      },
      {
        q: "ما هي نتيجة المقارنة 5 != 3 ؟",
        options: ["True", "False", "Error", "None"],
        correct: 0,
        explanation: "المعامل != يعني (لا يساوي)، وبما أن 5 لا تساوي 3 فإن النتيجة هي True[cite: 317, 319]."
      },
      {
        q: "الرابط المنطقي (and) يُعطي نتيجة True فقط في حالة:",

        q: "من أفضل الممارسات البرمجية في كتابة الدوال، أن تقوم الدالة بـ:",
        options: ["تعديل المتغيرات العالمية قدر الإمكان لتسهيل الوصول", "تجاوز الـ 100 سطر لشمولية العمل", "أكبر عدد ممكن من المهام المختلفة لتقليل عدد الدوال في البرنامج", "مهمة واحدة فقط واضحة ويكون اسمها معبراً عن هذه المهمة"],
        correct: 3,
        explanation: "القاعدة الذهبية في هندسة البرمجيات أن تؤدي الدالة مهمة واحدة محددة بوضوح (Single Responsibility) ليسهل تتبعها وصيانتها."

      }
    ]
  };

  // ==========================================
  // النظام والمتغيرات
  // ==========================================
  let playerXP = parseInt(localStorage.getItem('devAhmedXP')) || 0;
  let inventory = JSON.parse(localStorage.getItem('devAhmedInv')) || { fifty: 0, shield: 0 };
  let currentQ = 0, streak = 0, sessionXP = 0;
  let answers = [], hintsUsed = [];
  let shieldActive = false;
  const LETTERS = ['أ','ب','ج','د'];

  function updateUI() {
    document.getElementById('player-xp').textContent = playerXP;
    document.getElementById('player-level').textContent = Math.floor(Math.sqrt(playerXP / 100)) + 1;
    document.getElementById('streak-count').textContent = streak;
    document.getElementById('count-fifty').textContent = inventory.fifty;
    document.getElementById('count-shield').textContent = inventory.shield;
  }
  updateUI();

  function closeModal(id) { document.getElementById(id).style.display = 'none'; }
  
  function buyItem(item, price) {
    if(playerXP >= price) {
      playerXP -= price; inventory[item]++;
      localStorage.setItem('devAhmedXP', playerXP); localStorage.setItem('devAhmedInv', JSON.stringify(inventory));
      updateUI();
    } else alert("رصيد XP غير كافٍ!");
  }

  function startQuiz() {
    document.getElementById('welcome-screen').style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'block';
    document.getElementById('main-title').textContent = mySubjectData.title;
    answers = new Array(mySubjectData.questions.length).fill(null);
    hintsUsed = new Array(mySubjectData.questions.length).fill(false);
    renderQuestion();
  }

  function useFiftyFifty() {
    if(inventory.fifty <= 0 || answers[currentQ] !== null || hintsUsed[currentQ]) return;
    inventory.fifty--; updateUI(); localStorage.setItem('devAhmedInv', JSON.stringify(inventory));
    let q = mySubjectData.questions[currentQ];
    let opts = document.getElementById('options-container').children;
    let wrong = []; q.options.forEach((o, i) => { if(i !== q.correct) wrong.push(i); });
    let hide1 = wrong.splice(Math.floor(Math.random()*wrong.length), 1)[0];
    let hide2 = wrong.splice(Math.floor(Math.random()*wrong.length), 1)[0];
    opts[hide1].classList.add('hidden-hint'); opts[hide2].classList.add('hidden-hint');
    hintsUsed[currentQ] = true;
  }

  function useShield() {
    if(inventory.shield <= 0 || answers[currentQ] !== null || shieldActive) return;
    inventory.shield--; updateUI(); localStorage.setItem('devAhmedInv', JSON.stringify(inventory));
    shieldActive = true;
  }

  function renderQuestion() {
    let q = mySubjectData.questions[currentQ];
    document.getElementById('question-tracker').textContent = `${currentQ + 1} / ${mySubjectData.questions.length}`;
    document.getElementById('progress').style.width = `${(currentQ / mySubjectData.questions.length) * 100}%`;
    document.getElementById('question-text').textContent = q.q;
    document.getElementById('explanation-box').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
    
    let container = document.getElementById('options-container');
    container.innerHTML = '';
    
    q.options.forEach((opt, idx) => {
      let btn = document.createElement('div');
      btn.className = 'option-btn fade-in-ui';
      btn.innerHTML = `<div style="background:rgba(255,255,255,0.05); padding:2px 10px; border-radius:6px;">${LETTERS[idx]}</div> ${opt}`;
      if(answers[currentQ] === null) {
        btn.onclick = () => handleAnswer(idx, btn);
      } else {
        btn.classList.add('disabled');
        if(idx === q.correct) btn.classList.add('correct');
        else if(idx === answers[currentQ]) btn.classList.add('wrong');
      }
      container.appendChild(btn);
    });

    if(answers[currentQ] !== null) {
      document.getElementById('next-btn').style.display = 'inline-block';
      showExp();
    }
  }

  function handleAnswer(idx, btn) {
    if(answers[currentQ] !== null && !shieldActive) return;
    let q = mySubjectData.questions[currentQ];
    
    if(idx !== q.correct && shieldActive) {
      shieldActive = false; btn.classList.add('wrong', 'disabled'); btn.onclick = null; return;
    }
    
    shieldActive = false;
    answers[currentQ] = idx;
    
    if(idx === q.correct) {
      streak++; let gained = (streak >= 3 ? 30 : 15);
      playerXP += gained; sessionXP += gained;
      localStorage.setItem('devAhmedXP', playerXP);
    } else streak = 0;
    
    updateUI();
    renderQuestion();
  }

  function showExp() {
    let q = mySubjectData.questions[currentQ];
    let box = document.getElementById('explanation-box');
    let isCorrect = (answers[currentQ] === q.correct);
    box.className = 'explanation-ui fade-in-ui ' + (isCorrect ? 'correct' : 'wrong');
    box.innerHTML = `<strong>${isCorrect ? '✅ ممتاز!' : '❌ إجابة خاطئة!'}</strong><br>${q.explanation || 'الإجابة الصحيحة هي: ' + q.options[q.correct]}`;
    box.style.display = 'block';
  }

  function nextQuestion() {
    if(currentQ < mySubjectData.questions.length - 1) {
      currentQ++; renderQuestion();
    } else {
      document.getElementById('quiz-screen').style.display = 'none';
      document.getElementById('result-screen').style.display = 'block';
      let score = answers.filter((a, i) => a === mySubjectData.questions[i].correct).length;
      let pct = Math.round((score / mySubjectData.questions.length) * 100);
      document.getElementById('final-score').textContent = `${pct}%`;
      document.getElementById('earned-xp').textContent = sessionXP;
    }
  }

  // تأثيرات الخلفية البسيطة (Particles)
  const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  let particles = [];
  for(let i=0; i<50; i++) { particles.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2+1, vx: Math.random()-0.5, vy: Math.random()-0.5}); }
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = '#38bdf8';
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if(p.x < 0 || p.x > canvas.width) p.vx *= -1; if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
</script>
</body>
</html>
